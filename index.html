<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <!-- Inline SVG favicon — a brass bell on ink (no binary asset; all art is in-code). -->

  <!-- Open Graph / link unfurl — so a forwarded link previews cleanly. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Bell to Sell — A Predator Ridge Career Game" />
  <meta property="og:description" content="Three shifts, one promotion. A 5–10 minute jazz-noir career game." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Bell to Sell — A Predator Ridge Career Game" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0e0c10; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { touch-action: none; }
    /* Brief, friendly landscape hint — shown only in portrait on small touch
       screens, then auto-fades. The game plays fine in portrait; this just
       nudges toward the roomier landscape view. Never blocks or implies broken. */
    #rotate-hint {
      display: none; position: fixed; left: 50%; bottom: 24px;
      transform: translateX(-50%); z-index: 10;
      background: #f2b63a; color: #0e0c10;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700; font-size: 13px; letter-spacing: 1px;
      padding: 10px 16px; border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
      white-space: nowrap;
    }
    #rotate-hint.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="rotate-hint">↻ Rotate to landscape for the best view</div>
  <script>
    // Gentle, auto-dismissing landscape nudge — only in portrait on small touch
    // screens. The game is fully playable either way; this never blocks input.
    (function () {
      var hint = document.getElementById('rotate-hint');
      var smallTouch = window.matchMedia('(pointer: coarse)').matches &&
        Math.min(window.innerWidth, window.innerHeight) < 600;
      var portrait = window.innerHeight > window.innerWidth;
      if (smallTouch && portrait) {
        hint.style.display = 'block';
        // Reflow, then fade in; fade back out after ~2.5s and remove from flow.
        requestAnimationFrame(function () { hint.classList.add('show'); });
        setTimeout(function () { hint.classList.remove('show'); }, 2500);
        setTimeout(function () { hint.style.display = 'none'; }, 3000);
      }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
